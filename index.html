<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Particle</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#050816;
}

canvas{
display:block;
}

.title{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:42px;
font-family:Arial;
letter-spacing:5px;
text-shadow:
0 0 20px #00ffff,
0 0 40px #00ffff;
pointer-events:none;
}
</style>
</head>
<<div class="title">
AI PARTICLE
</div>
<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

}

resize();

window.addEventListener(
"resize",
resize
);

let mouse={
x:window.innerWidth/2,
y:window.innerHeight/2
};

window.addEventListener(
"mousemove",
e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
}
);

window.addEventListener(
"touchmove",
e=>{

mouse.x=e.touches[0].clientX;
mouse.y=e.touches[0].clientY;

}
);

class Particle{

constructor(){

this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;

this.vx=(Math.random()-0.5)*2;
this.vy=(Math.random()-0.5)*2;

this.size=Math.random()*3+1;

}

update(){

let dx=
mouse.x-this.x;

let dy=
mouse.y-this.y;

let dist=
Math.sqrt(dx*dx+dy*dy);

if(dist<180){

this.vx+=dx*0.0005;
this.vy+=dy*0.0005;

}

this.x+=this.vx;
this.y+=this.vy;

this.vx*=0.99;
this.vy*=0.99;

}

draw(){

ctx.beginPath();

ctx.arc(
this.x,
this.y,
this.size,
0,
Math.PI*2
);

ctx.fillStyle="#00ffff";

ctx.fill();

}

}

const particles=[];

for(let i=0;i<500;i++){

particles.push(
new Particle()
);

}

function animate(){

ctx.fillStyle=
"rgba(5,8,22,0.2)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

particles.forEach(p=>{

p.update();
p.draw();

});

requestAnimationFrame(
animate
);

}

animate();

</script>
</body>
</html>
