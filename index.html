<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hand Particle</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:radial-gradient(circle at center,#0f172a,#020617);
font-family:Arial,sans-serif;
}

canvas{
position:fixed;
top:0;
left:0;
}

#video{
position:fixed;
right:15px;
bottom:15px;
width:200px;
border-radius:16px;
border:2px solid rgba(0,255,255,.5);
box-shadow:0 0 25px rgba(0,255,255,.4);
z-index:10;
}

.title{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:36px;
font-weight:700;
letter-spacing:4px;
text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
z-index:5;
}

.sub{
position:fixed;
top:80px;
left:50%;
transform:translateX(-50%);
color:#94a3b8;
font-size:14px;
letter-spacing:2px;
z-index:5;
}
</style>
</head>

<body>

<div class="title">AI HAND TRACKING</div>
<div class="sub">Move Your Finger To Control Particles</div>

<canvas id="canvas"></canvas>

<video id="video" autoplay playsinline muted></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = innerWidth;
canvas.height = innerHeight;
}
resize();

window.addEventListener("resize",resize);

let targetX = canvas.width/2;
let targetY = canvas.height/2;

class Particle{

constructor(){

this.x = Math.random()*canvas.width;
this.y = Math.random()*canvas.height;

this.size = Math.random()*3+1;

this.speed = Math.random()*0.04+0.01;

}

update(){

const dx = targetX - this.x;
const dy = targetY - this.y;

this.x += dx*this.speed;
this.y += dy*this.speed;

}

draw(){

ctx.beginPath();

ctx.arc(
this.x,
this.y,
this.size,
0,
Math.PI*2
);

ctx.fillStyle="#00ffff";
ctx.fill();

}
}

const particles=[];

for(let i=0;i<1200;i++){
particles.push(new Particle());
}

function animate(){

ctx.fillStyle="rgba(2,6,23,0.12)";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

particles.forEach(p=>{
p.update();
p.draw();
});

requestAnimationFrame(animate);
}

animate();

const videoElement =
document.getElementById("video");

const hands = new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
}
});

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(results=>{

if(
results.multiHandLandmarks &&
results.multiHandLandmarks.length
){

const finger =
results.multiHandLandmarks[0][8];

targetX =
(1-finger.x)*
canvas.width;

targetY =
finger.y*
canvas.height;

}

});

const camera =
new Camera(
videoElement,
{
onFrame:async()=>{

await hands.send({
image:videoElement
});

},
width:1280,
height:720
}
);

camera.start();

</script>

</body>
</html>
